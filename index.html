<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beautiful Markdown Renderer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f9fafb;
        color: #111827;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(280px, 1fr) minmax(280px, 1fr);
        gap: 20px;
        max-width: 1300px;
        margin: 0 auto;
      }

      .panel {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        overflow: hidden;
      }

      .panel h2 {
        margin: 0;
        padding: 12px 16px;
        font-size: 14px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        border-bottom: 1px solid #e5e7eb;
        color: #6b7280;
      }

      textarea {
        width: 100%;
        min-height: 80vh;
        border: 0;
        resize: vertical;
        padding: 16px;
        font: 15px/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      .preview-wrap {
        padding: 28px;
      }

      .markdown-body {
        line-height: 1.62;
        max-width: 700px;
        margin: 0 auto;
        font-size: 16px;
        color: #111827;
      }

      .markdown-body p {
        margin: 0 0 1.3em;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4,
      .markdown-body h5,
      .markdown-body h6 {
        letter-spacing: 0.01em;
        line-height: 1.25;
        margin: 1.5em 0 0.6em;
      }

      .markdown-body pre {
        background: #111827;
        color: #f3f4f6;
        padding: 12px 14px;
        border-radius: 10px;
        overflow-x: auto;
      }

      .markdown-body code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      .markdown-body blockquote {
        margin: 0 0 1.3em;
        padding: 0.2em 0 0.2em 1em;
        border-left: 3px solid #d1d5db;
        color: #4b5563;
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
        }

        textarea {
          min-height: 45vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h2>Markdown input</h2>
        <textarea id="source"># Beautiful Markdown

This preview uses **Inter**, `line-height: 1.62`, and a content width of **700px**.

## Why it feels nice

- Comfortable paragraph rhythm
- Slightly spaced headings
- Balanced reading width

> This should feel close to OpenAI-style typography.

```js
console.log("Live markdown rendering");
```
</textarea>
      </section>

      <section class="panel">
        <h2>Rendered preview</h2>
        <div class="preview-wrap">
          <article id="preview" class="markdown-body"></article>
        </div>
      </section>
    </main>

    <script>
      const source = document.getElementById("source");
      const preview = document.getElementById("preview");

      function render() {
        preview.innerHTML = marked.parse(source.value);
      }

      source.addEventListener("input", render);
      render();
    </script>
  </body>
</html>
